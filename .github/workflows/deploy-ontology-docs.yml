name: Deploy Ontology Documentation

on:
  push:
    branches: [master]
    paths:
      - 'ontology/szd-ontology.ttl'
      - 'ontology/nachlass-ontology.ttl'
      - 'ontology/szd-shapes.ttl'
      - 'ontology/generate_docs.py'
      - 'ontology/generate_graph.py'
      - 'ontology/validate.py'
      - 'docs/css/**'
      - 'docs/index.html'
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install rdflib pyshacl

      - name: Validate ontology
        run: python ontology/validate.py

      - name: Generate documentation
        run: python ontology/generate_docs.py

      - name: Commit generated docs
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ontology/
          git diff --cached --quiet || git commit -m "Auto-regenerate ontology documentation"
          git push
